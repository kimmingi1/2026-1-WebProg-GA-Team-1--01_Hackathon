<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부트스트랩 게시판</title>
    <!-- 부트스트랩 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">게시판 리스트</h2>
    <!-- 게시판 테이블 -->
    <table class="table table-striped table-hover border">
        <thead class="table-dark">
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>작성일</th>
            <th>공감</th>
            <th>관리</th> <!-- 관리 열 추가 -->
        </tr>
        </thead>
        <tbody id="boardBody">
        <tr>
            <td>3</td>
            <td><a href="#" class="text-decoration-none text-dark">이해가 잘되는 것 같습니다.</a></td>
            <td>김민기</td>
            <td>2026-05-06</td>
            <td>10</td>
            <td><button class="btn btn-danger btn-sm" onclick="deletePost(this)">삭제</button></td>
        </tr>
        <tr>
            <td>2</td>
            <td><a href="#" class="text-decoration-none text-dark">최고의 강의입니다</a></td>
            <td>박준한</td>
            <td>2026-05-05</td>
            <td>28</td>
            <td><button class="btn btn-danger btn-sm" onclick="deletePost(this)">삭제</button></td>
        </tr>
        <tr>
            <td>1</td>
            <td><a href="#" class="text-decoration-none text-dark">잘못된 부분이 있습니다.</a></td>
            <td>신성현</td>
            <td>2026-05-03</td>
            <td>300</td>
            <td><button class="btn btn-danger btn-sm" onclick="deletePost(this)">삭제</button></td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    // 글 삭제 기능
    function deletePost(button) {
        // confirm을 사용하여 삭제 여부 재확인
        if (confirm('정말로 이 글을 삭제하시겠습니까?')) {
            // 버튼(this)의 부모(td)의 부모(tr)를 찾아 삭제
            const row = button.closest('tr'); // closest()가 더 직관적이고 안전합니다.
            row.remove(); // 잘려있던 부분 수정
        }
    }
</script>

<script src="https://jsdelivr.net"></script>
</body>
</html>
